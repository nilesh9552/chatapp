server.port=8080

# Database configuration: prefer explicit Spring env vars set on the host
# For Render: add environment variables `SPRING_DATASOURCE_URL`,
# `SPRING_DATASOURCE_USERNAME`, and `SPRING_DATASOURCE_PASSWORD` in the
# Render dashboard (or use the Postgres addon and set these accordingly).
# If these are not provided, the application falls back to the embedded H2 DB.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_HIBERNATE_FORMAT:true}

# H2 console (enabled for development). Disable in production if using external DB.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false