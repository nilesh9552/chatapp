<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chat App</title>
</head>
<body>

<h1>Spring Chat App</h1>

<form action="/chat" method="get">

    <input
            type="text"
            name="username"
            placeholder="Enter Your Name"
            required>

    <button type="submit">
        Join Chat
    </button>

</form>

</body>
</html>
